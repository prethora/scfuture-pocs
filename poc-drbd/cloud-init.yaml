#cloud-config

# DRBD Bipod PoC — Server provisioning
# Installs DRBD 9, Docker, btrfs-progs on Ubuntu 24.04

debconf_selections: |
  postfix postfix/main_mailer_type select No configuration

apt:
  sources:
    linbit:
      source: "ppa:linbit/linbit-drbd9-stack"

package_update: true
package_upgrade: false

packages:
  - drbd-utils
  - drbd-dkms
  - linux-headers-generic
  - btrfs-progs
  - docker.io
  - docker-buildx
  - util-linux
  - kmod
  - jq
  - curl

runcmd:
  - apt-get install -y linux-headers-$(uname -r)
  - dkms autoinstall
  - modprobe drbd
  - systemctl enable docker
  - systemctl start docker
  - mkdir -p /data/images /mnt/users/alice
  - echo "cloud-init provisioning complete" > /var/log/drbd-poc-ready
